<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Survey Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>User Survey Form</h1>

    <form action="ProcessSurvey.jsp" method="POST">
        
        <fieldset>
            <legend>Personal Information</legend>
            
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" name="fullName" required placeholder="First and Last Name">
            <br>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="student@example.com">
            <br>
            
            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" required pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" title="Format: 123-456-7890" placeholder="123-456-7890">
            <br>
            
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" required min="1" max="120" value="0">
            <br>
            
            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" value="Male" required>
            <label for="male">Male</label>
            
            <input type="radio" id="female" name="gender" value="Female">
            <label for="female">Female</label>
            
            <input type="radio" id="other" name="gender" value="Other">
            <label for="other">Other</label>
        </fieldset>

        <fieldset>
            <legend>Education & Employment</legend>
            
            <label for="qualification">Highest Qualification:</label>
            <select id="qualification" name="qualification" required>
                <option value="High School">High School</option>
                <option value="Bachelor's" selected>Bachelor's</option>
                <option value="Master's">Master's</option>
                <option value="PhD">PhD</option>
            </select>
            <br>
            
            <label>Employment Status:</label><br>
            <input type="radio" id="student" name="employment" value="Student" required>
            <label for="student">Student</label>
            
            <input type="radio" id="employed" name="employment" value="Employed">
            <label for="employed">Employed</label>
            
            <input type="radio" id="unemployed" name="employment" value="Unemployed">
            <label for="unemployed">Unemployed</label>
        </fieldset>

        <fieldset>
            <legend>Technical Skills</legend>
            
            <label>Skills:</label><br>
            <input type="checkbox" id="java" name="skills" value="Java">
            <label for="java">Java</label>
            
            <input type="checkbox" id="python" name="skills" value="Python">
            <label for="python">Python</label>
            
            <input type="checkbox" id="htmlcss" name="skills" value="HTML/CSS">
            <label for="htmlcss">HTML/CSS</label>
            
            <input type="checkbox" id="javascript" name="skills" value="JavaScript">
            <label for="javascript">JavaScript</label>
            <br><br>
            
            <label for="proficiency">Rate your coding proficiency:</label><br>
            <input type="range" id="proficiency" name="proficiency" min="1" max="10" value="5">
        </fieldset>

        <fieldset>
            <legend>Upload Documents</legend>
            <label for="resume">Upload Resume:</label><br>
            <input type="file" id="resume" name="resume">
        </fieldset>

        <fieldset>
            <legend>Feedback</legend>
            <label for="comments">Any Comments:</label>
            <textarea id="comments" name="comments" rows="5" placeholder="Enter your feedback here..."></textarea>
        </fieldset>

        <button type="submit">Submit Survey</button>

    </form>

</body>
</html>
